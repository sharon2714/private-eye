<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRIVATE EYE</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>PRIVATE EYE</h1>
    <p class="subtitle">AI Simulation Detective Game</p>

    <div class="mode-box">
        <h2>AI Simulation Mode</h2>
        <p>
            본 모드는 원래 7인 멀티플레이 게임인 Private Eye를
            혼자 체험할 수 있도록 구현한 시연용 버전입니다.
        </p>

        <button onclick="startGame()">
            사건 수사 시작
        </button>
    </div>

    <div id="gameArea" style="display:none;">

        <div class="case-file">

            <h2>CONFIDENTIAL CASE FILE</h2>

            <p id="caseTitle"></p>
            <p id="caseLocation"></p>
            <p id="caseVictim"></p>
            <p id="caseMotive"></p>

        </div>

        <div class="detective-card">

            <h2>탐정</h2>

            <p>
                당신은 사건을 해결하기 위해 파견된 탐정입니다.
            </p>

        </div>

        <div class="investigation-box">

            <h2>조사 단계</h2>

            <button onclick="investigate('lab')">
                연구실 조사
            </button>

            <button onclick="investigate('hall')">
                복도 조사
            </button>

            <button onclick="investigate('storage')">
                창고 조사
            </button>

            <button onclick="investigate('office')">
                사무실 조사
            </button>

            <div id="clueArea"></div>

        </div>

        <div class="suspect-box">

            <h2>용의자 목록</h2>

            <ul>

                <li>김도윤</li>
                <li>박서연</li>
                <li>최현우</li>
                <li>정지민</li>
                <li>이유진</li>
                <li>강민석</li>

            </ul>

        </div>

        <div class="discussion-box">

            <h2>토론</h2>

            <button onclick="askQuestion()">
                질문하기
            </button>

            <button onclick="pressureSuspect()">
                압박하기
            </button>

            <button onclick="accuseSuspect()">
                의심하기
            </button>

            <div id="discussionLog"></div>

        </div>

        <div class="vote-box">

            <h2>최종 투표</h2>

            <select id="voteSelect">

                <option>김도윤</option>
                <option>박서연</option>
                <option>최현우</option>
                <option>정지민</option>
                <option>이유진</option>
                <option>강민석</option>

            </select>

            <button onclick="voteMurderer()">
                범인 지목
            </button>

        </div>

        <div id="resultArea"></div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
