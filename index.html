<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRIVATE EYE</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>PRIVATE EYE</h1>
<p class="subtitle">AI Detective Simulation Game</p>

<div class="mode-box">

<h2>AI Simulation Mode</h2>

<p class="intro-text">
이 게임은 교수님 체험용 1인 추리 시뮬레이션입니다.
사건마다 용의자와 단서가 모두 다르게 생성됩니다.
</p>

<button onclick="startGame()">사건 수사 시작</button>
<button onclick="resetCase()">사건 다시 생성</button>

<p id="caseStatus"></p>

</div>

<div id="gameArea" style="display:none;">

<div id="step1" class="step">

<h2>📁 사건 파일</h2>

<div class="case-file">
<div class="stamp">CONFIDENTIAL</div>
<h3 id="caseTitle"></h3>
<p id="caseLocation"></p>
<p id="caseVictim"></p>
<p id="caseMotive"></p>
</div>

<button onclick="goStep(2)">조사</button>

</div>

<div id="step2" class="step">

<h2>🔍 현장 조사</h2>

<div id="clueArea"></div>

<div class="clue-detail-box">
<h3>단서 분석</h3>
<div id="clueDetail"></div>
</div>

<div class="note-box">
<h3>탐정 수첩</h3>
<div id="detectiveNotes"></div>
</div>

<button onclick="goStep(3)">용의자 조사</button>

</div>

<div id="step3" class="step">

<h2>👥 용의자</h2>

<div id="suspectArea"></div>

<div id="discussionLog"></div>

<button onclick="goStep(4)">투표</button>

</div>

<div id="step4" class="step">

<h2>🗳 투표</h2>

<select id="voteSelect"></select>

<button onclick="vote()">선택</button>

<div id="resultArea"></div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
